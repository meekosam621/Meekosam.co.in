
<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>స్థానికం SHORTS</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      height: 100%; 
      overflow: hidden; 
      font-family: 'Noto Sans Telugu', sans-serif;
      background: #000;
    }
    .header {
      position: fixed;
      top: 0;
      width: 100%;
      background: #E60000;
      padding: 14px;
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      z-index: 100;
      letter-spacing: 1px;
    }
    .shorts-container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .shorts-container::-webkit-scrollbar { display: none; }
    .news-slide {
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 90px 20px 40px;
      background-size: cover;
      background-position: center;
    }
    .news-slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
      z-index: 1;
    }
    .content {
      position: relative;
      z-index: 2;
    }
    .tag {
      background: #E60000;
      display: inline-block;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #fff;
    }
    .title {
      font-size: 26px;
      font-weight: 900;
      line-height: 1.3;
      margin-bottom: 12px;
      color: #fff;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    }
    .desc {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 24px;
      color: #e0e0e0;
    }
    .read-btn {
      background: #fff;
      color: #E60000;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 900;
      width: 100%;
      cursor: pointer;
    }

      bottom: 25px;
